name: Build Artifacts
permissions:
  contents: read
  packages: write
  actions: read
on:
  workflow_dispatch: {}
  # release:
  #   types: [created]
  # push:
  #   branches:
  #     - '**'
  #   paths-ignore:
  #     - 'docs/**'
  #     - 'CODE-OF-CONDUCT.md'
  #     - 'CONTRIBUTING.md'
  #     - 'LICENSE'
  #     - 'README.md'
  #     - 'SECURITY.md'
  # pull_request:
  #   branches:
  #     - '**'
  #   paths-ignore:
  #     - 'docs/**'
  #     - 'CODE-OF-CONDUCT.md'
  #     - 'CONTRIBUTING.md'
  #     - 'LICENSE'
  #     - 'README.md'
  #     - 'SECURITY.md'

env:
  TAG_NAME: ${{ github.event.release.tag_name || github.ref }}
  GITHUB_GROUP: ${{ github.repository_owner }}

concurrency:
  # On main/release, we don't want any jobs cancelled so the sha is used to name the group
  # On PR branches, we cancel the job if new commits are pushed
  # More info: https://stackoverflow.com/a/68422069/253468
  group: ${{ github.ref == 'refs/heads/main' && format('ci-main-{0}', github.sha) || format('ci-main-{0}', github.ref) }}
  cancel-in-progress: true

jobs:
  multiplatform_build:
    if: github.event.pull_request.user.login != 'dependabot[bot]' || github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        component:
          - name: qubership-consul-integration-tests
            file: integration-tests/docker/Dockerfile
            context: ""
          - name: qubership-consul-disaster-recovery
            file: disaster-recovery/docker/Dockerfile
            context: disaster-recovery
          - name: qubership-consul-transfer
            file: docker-transfer/Dockerfile
            context: ""
          - name: qubership-consul-acl-configurator
            file: acl-configurator/consul-acl-configurator-operator/Dockerfile
            context: acl-configurator/consul-acl-configurator-operator
          - name: qubership-consul-rest-acl-configurator
            file: acl-configurator/rest-acl-configurator/Dockerfile
            context: acl-configurator/rest-acl-configurator
          - name: qubership-consul-backup-daemon
            file: backup-daemon/docker/Dockerfile
            context: backup-daemon
          - name: qubership-consul-remove-tokens
            file: remove-tokens/docker/Dockerfile
            context: remove-tokens
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${GITHUB_ACTOR}
          password: ${{secrets.GITHUB_TOKEN}}
      - name: Prepare Tag
        run: echo "TAG_NAME=$(echo ${TAG_NAME} | sed 's@refs/tags/@@;s@refs/heads/@@;s@/@_@g')" >> $GITHUB_ENV
      - name: Prepare Group
        run: echo "GITHUB_GROUP=${GITHUB_GROUP,,}" >> $GITHUB_ENV
      - name: Get package IDs for delete
        id: get-ids-for-delete
        uses: Netcracker/get-package-ids@84bc8eb8bed50218be76e671b3a24c35a1300979 # v0.0.1
        with:
          component-name: ${{ matrix.component.name }}
          component-tag: ${{ env.TAG_NAME }}
          access-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          no-cache: true
          context: ${{ matrix.component.context }}
          file: ${{ matrix.component.file }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' && github.actor != 'dependabot[bot]' }}
          tags: ghcr.io/${{ env.GITHUB_GROUP }}/${{ matrix.component.name }}:${{ env.TAG_NAME }}
          provenance: false
