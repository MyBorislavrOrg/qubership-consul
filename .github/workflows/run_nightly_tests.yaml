name: Run Nightly Consul Pipeline

permissions:
  contents: read

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  Nightly-Consul-Pipeline:
    uses: Netcracker/qubership-test-pipelines/.github/workflows/consul.yaml@0317a7311f0fdd1e6d492fb3a75d722835851b15 # v1.6.1
    with:
      service_branch: 'main'
      pipeline_branch: '0317a7311f0fdd1e6d492fb3a75d722835851b15'
      scope: 'nightly'
    secrets:
      AWS_S3_ACCESS_KEY_ID: ${{secrets.AWS_S3_ACCESS_KEY_ID}}
      AWS_S3_ACCESS_KEY_SECRET: ${{secrets.AWS_S3_ACCESS_KEY_SECRET}}
